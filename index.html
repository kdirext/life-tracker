<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Life Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0d0f;
  --surface: #18181c;
  --surface2: #222228;
  --border: #2a2a32;
  --text: #ebebf0;
  --text2: #80808f;
  --text3: #44444f;
  --accent: #7c6fff;
  --green: #3ecf8e;
  --amber: #f5a623;
  --red: #f56060;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'IBM Plex Sans Thai', sans-serif; overflow: hidden; }
.app { display: flex; flex-direction: column; height: 100vh; max-width: 480px; margin: 0 auto; }
.header { display: flex; align-items: center; padding: 14px 18px 10px; gap: 10px; flex-shrink: 0; }
.header-left { flex: 1; }
.header-title { font-size: 16px; font-weight: 600; letter-spacing: -0.3px; }
.header-sub { font-size: 11px; color: var(--text2); font-family: 'IBM Plex Mono', monospace; margin-top: 1px; }
.sync-badge { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text3); }
.sync-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text3); }
.sync-dot.on { background: var(--green); }
.sync-dot.busy { background: var(--amber); animation: blink 0.8s infinite; }
@keyframes blink { 0%,100%{opacity:1}50%{opacity:0.2} }
.nav { display: flex; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.nav-btn { flex: 1; padding: 10px 4px; font-size: 12px; color: var(--text2); background: transparent; border: none; cursor: pointer; font-family: inherit; position: relative; transition: color 0.15s; }
.nav-btn.active { color: var(--accent); }
.nav-btn.active::after { content:''; position:absolute; bottom:0; left:25%; right:25%; height:2px; background:var(--accent); border-radius:2px 2px 0 0; }
.content { flex: 1; overflow: hidden; position: relative; }
.view { position: absolute; inset: 0; display: none; flex-direction: column; overflow: hidden; }
.view.active { display: flex; }

/* CLOCK */
.clock-toolbar { display: flex; align-items: center; gap: 8px; padding: 10px 16px; flex-shrink: 0; }
.dnbtn { width: 30px; height: 30px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); color: var(--text); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.dlabel { flex: 1; text-align: center; }
.dlabel .dn { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.8px; }
.dlabel .df { font-size: 14px; font-weight: 500; margin-top: 1px; }
.todaybtn { font-size: 11px; padding: 5px 10px; border-radius: 99px; border: 1px solid var(--accent); color: var(--accent); background: transparent; cursor: pointer; font-family: inherit; flex-shrink: 0; }
.clock-area { flex: 1; display: flex; align-items: center; justify-content: center; padding: 4px; overflow: hidden; }
#clock-svg { touch-action: none; user-select: none; cursor: crosshair; max-width: 100%; max-height: 100%; }
.legend { padding: 8px 14px 10px; display: flex; flex-wrap: wrap; gap: 5px; flex-shrink: 0; }
.lchip { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--text2); padding: 3px 8px; border-radius: 99px; border: 1px solid var(--border); cursor: pointer; background: transparent; font-family: inherit; transition: all 0.15s; }
.ldot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

/* SUMMARY */
.sscroll { flex: 1; overflow-y: auto; padding: 14px; }
.prow { display: flex; gap: 6px; margin-bottom: 16px; }
.pbtn { padding: 6px 14px; border-radius: 99px; border: 1px solid var(--border); background: transparent; color: var(--text2); font-size: 12px; cursor: pointer; font-family: inherit; }
.pbtn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.mgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
.mcard { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px; }
.mcard .ml { font-size: 10px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 5px; }
.mcard .mv { font-size: 24px; font-weight: 600; line-height: 1; }
.mcard .ms { font-size: 10px; color: var(--text3); margin-top: 3px; }
.slabel { font-size: 10px; color: var(--text2); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
.blist { display: flex; flex-direction: column; gap: 9px; }
.brow { display: grid; grid-template-columns: 90px 1fr 52px; gap: 8px; align-items: center; }
.bname { font-size: 12px; text-align: right; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.btrack { height: 7px; background: var(--surface2); border-radius: 99px; overflow: hidden; }
.bfill { height: 100%; border-radius: 99px; transition: width 0.5s; }
.bval { font-size: 11px; color: var(--text3); font-family: 'IBM Plex Mono', monospace; }
.empty { text-align: center; padding: 40px 20px; color: var(--text3); font-size: 13px; line-height: 2; }

/* SETTINGS */
.stscroll { flex: 1; overflow-y: auto; padding: 14px; }
.stitle { font-size: 10px; color: var(--text2); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
.citem { display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 6px; }
.cdot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
.cname { flex: 1; font-size: 13px; }
.cdel { background: transparent; border: none; color: var(--text3); font-size: 18px; cursor: pointer; padding: 0 4px; }
.addrow { display: grid; grid-template-columns: 1fr 38px 56px; gap: 7px; margin-top: 10px; align-items: center; }
.addrow input[type=text] { background: var(--surface); border: 1px solid var(--border); color: var(--text); border-radius: 8px; padding: 8px 10px; font-size: 13px; font-family: inherit; outline: none; }
.addrow input[type=text]:focus { border-color: var(--accent); }
.addrow input[type=color] { width: 38px; height: 36px; border: 1px solid var(--border); border-radius: 8px; background: var(--surface); cursor: pointer; padding: 2px; }
.addbtn { padding: 8px 4px; background: var(--accent); border: none; color: #fff; border-radius: 8px; font-size: 12px; cursor: pointer; font-family: inherit; }
.actbtn { width: 100%; padding: 11px; background: var(--surface); border: 1px solid var(--border); color: var(--text2); border-radius: 10px; font-size: 13px; cursor: pointer; font-family: inherit; margin-bottom: 8px; text-align: left; }

/* OVERLAY SHEET */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.65); z-index: 200; display: none; align-items: flex-end; justify-content: center; }
.overlay.open { display: flex; }
.sheet { background: var(--surface); border-radius: 20px 20px 0 0; padding: 18px 18px 32px; width: 100%; max-width: 480px; }
.shandle { width: 32px; height: 3px; background: var(--border); border-radius: 2px; margin: 0 auto 16px; }
.stime { font-size: 13px; color: var(--text2); margin-bottom: 12px; font-family: 'IBM Plex Mono', monospace; }
.chipgrid { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 14px; }
.chip { padding: 7px 13px; border-radius: 99px; border: 1.5px solid var(--border); background: transparent; color: var(--text2); font-size: 12px; cursor: pointer; font-family: inherit; display: flex; align-items: center; gap: 5px; transition: all 0.1s; }
.chipdot { width: 7px; height: 7px; border-radius: 50%; }
.ninp { width: 100%; background: var(--surface2); border: 1px solid var(--border); color: var(--text); border-radius: 10px; padding: 10px 12px; font-size: 13px; font-family: inherit; margin-bottom: 12px; outline: none; }
.ninp:focus { border-color: var(--accent); }
.sbtns { display: flex; gap: 8px; }
.sbtn { flex: 1; padding: 12px; border-radius: 10px; font-size: 13px; font-weight: 500; cursor: pointer; border: none; font-family: inherit; }
.sbtn-del { background: #f5606022; color: var(--red); }
.sbtn-cancel { background: var(--surface2); color: var(--text2); }
.sbtn-save { background: var(--accent); color: #fff; }

.loading { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; z-index: 999; }
.spin { width: 32px; height: 32px; border: 2.5px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading p { font-size: 12px; color: var(--text2); }
</style>
</head>
<body>
<div class="loading" id="loading"><div class="spin"></div><p>กำลังเชื่อมต่อ...</p></div>

<div class="app" id="app" style="display:none">
  <div class="header">
    <div class="header-left">
      <div class="header-title">Life Tracker</div>
      <div class="header-sub" id="htime"></div>
    </div>
    <div class="sync-badge"><div class="sync-dot" id="sdot"></div><span id="slbl">—</span></div>
  </div>
  <div class="nav">
    <button class="nav-btn active" onclick="sw('clock')">🕐 บันทึก</button>
    <button class="nav-btn" onclick="sw('summary')">📊 วิเคราะห์</button>
    <button class="nav-btn" onclick="sw('settings')">⚙️ ตั้งค่า</button>
  </div>
  <div class="content">
    <div class="view active" id="view-clock">
      <div class="clock-toolbar">
        <button class="dnbtn" onclick="chday(-1)">‹</button>
        <div class="dlabel"><div class="dn" id="dname"></div><div class="df" id="dfull"></div></div>
        <button class="dnbtn" onclick="chday(1)">›</button>
        <button class="todaybtn" onclick="goToday()">วันนี้</button>
      </div>
      <div class="clock-area"><svg id="clock-svg" viewBox="0 0 400 400"></svg></div>
      <div class="legend" id="legend"></div>
    </div>

    <div class="view" id="view-summary">
      <div class="sscroll">
        <div class="prow">
          <button class="pbtn active" onclick="setSP(7,this)">7 วัน</button>
          <button class="pbtn" onclick="setSP(30,this)">30 วัน</button>
          <button class="pbtn" onclick="setSP(90,this)">90 วัน</button>
        </div>
        <div class="mgrid" id="mgrid"></div>
        <div class="slabel">สัดส่วนเวลา</div>
        <div class="blist" id="blist"></div>
      </div>
    </div>

    <div class="view" id="view-settings">
      <div class="stscroll">
        <div class="stitle">หมวดหมู่</div>
        <div id="catlist"></div>
        <div class="addrow">
          <input type="text" id="ncname" placeholder="ชื่อหมวดหมู่ใหม่">
          <input type="color" id="nccolor" value="#7c6fff">
          <button class="addbtn" onclick="addCat()">+ เพิ่ม</button>
        </div>
        <div style="margin-top:20px">
          <div class="stitle">ข้อมูล</div>
          <button class="actbtn" onclick="exportJSON()">⬇ Export JSON</button>
          <button class="actbtn" style="color:var(--red)" onclick="clearDay()">🗑 ล้างข้อมูลวันนี้</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="overlay" id="overlay" onclick="tryCloseSheet(event)">
  <div class="sheet">
    <div class="shandle"></div>
    <div class="stime" id="stime"></div>
    <div class="chipgrid" id="chips"></div>
    <input class="ninp" id="ninp" placeholder="บันทึกเพิ่มเติม เช่น ประชุม, วิ่ง 5km...">
    <div class="sbtns">
      <button class="sbtn sbtn-del" id="delbtn" onclick="deleteBlock()" style="display:none">ลบ</button>
      <button class="sbtn sbtn-cancel" onclick="closeSheet()">ยกเลิก</button>
      <button class="sbtn sbtn-save" onclick="saveBlock()">บันทึก</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBFn_SY8R23TwnBcYz7u7ZxM0IBwR9PMsE",
  authDomain: "korn-life-tracker.firebaseapp.com",
  projectId: "korn-life-tracker",
  storageBucket: "korn-life-tracker.firebasestorage.app",
  messagingSenderId: "1014696586433",
  appId: "1:1014696586433:web:c1101f0f3a24438fb0f840"
};
const fb = initializeApp(firebaseConfig);
const db = getFirestore(fb);

// STATE
let currentDay = new Date();
let blocks = [];
let categories = [
  {id:'sleep',   name:'นอนหลับ',       color:'#6b7aad'},
  {id:'work',    name:'ทำงาน',          color:'#378ADD'},
  {id:'learn',   name:'เรียนรู้',        color:'#3ecf8e'},
  {id:'exercise',name:'ออกกำลังกาย',   color:'#f5a623'},
  {id:'social',  name:'สังคม/ครอบครัว',color:'#a594ff'},
  {id:'leisure', name:'พักผ่อน',        color:'#f56060'},
  {id:'personal',name:'ส่วนตัว',        color:'#f0c040'},
  {id:'commute', name:'เดินทาง',        color:'#5DCAA5'},
];
let activeCat = 'sleep';
let summaryPeriod = 7;
let unsub = null;

// Drag state
let dragStartMin = null;
let dragEndMin = null;
let isDragging = false;

// Sheet state
let editingId = null;
let pendingRange = null;
let selCatId = null;

// SVG constants
const CX=200, CY=200, RO=168, RI=108, RM=(RO+RI)/2;
const SVG_NS = 'http://www.w3.org/2000/svg';

// UTILS
function dk(d){ return d.toISOString().slice(0,10); }
function catBy(id){ return categories.find(c=>c.id===id); }
function minToRad(m){ return ((m/1440)*2*Math.PI) - Math.PI/2; }
function fmtMin(m){ m=((m%1440)+1440)%1440; return Math.floor(m/60).toString().padStart(2,'0')+':'+((m%60).toString().padStart(2,'0')); }
function snapMin(m){ return Math.round(m/5)*5; }

function ptToMin(x,y){
  const angle = Math.atan2(y-CY, x-CX);
  let deg = angle * 180/Math.PI + 90;
  if(deg<0) deg+=360;
  return snapMin((deg/360)*1440);
}

function svgCoords(e){
  const svg = document.getElementById('clock-svg');
  const r = svg.getBoundingClientRect();
  const t = e.touches ? e.touches[0] : e;
  return {
    x: ((t.clientX - r.left) / r.width) * 400,
    y: ((t.clientY - r.top) / r.height) * 400
  };
}

function onRing(x,y){
  const d = Math.sqrt((x-CX)**2+(y-CY)**2);
  return d >= RI-15 && d <= RO+15;
}

function arcPath(s, e, ri, ro){
  // s, e in minutes (0-1440), can cross midnight
  let span = e - s;
  if(span <= 0) span += 1440;
  if(span > 1440) span = 1440;
  const a1 = minToRad(s);
  const a2 = minToRad(s + span);
  const large = span > 720 ? 1 : 0;
  const x1 = CX + ro*Math.cos(a1), y1 = CY + ro*Math.sin(a1);
  const x2 = CX + ro*Math.cos(a2), y2 = CY + ro*Math.sin(a2);
  const x3 = CX + ri*Math.cos(a2), y3 = CY + ri*Math.sin(a2);
  const x4 = CX + ri*Math.cos(a1), y4 = CY + ri*Math.sin(a1);
  if(span >= 1439) {
    // Full circle
    return `M${CX},${CY-ro} A${ro},${ro} 0 1,1 ${CX-0.01},${CY-ro} Z M${CX},${CY-ri} A${ri},${ri} 0 1,0 ${CX-0.01},${CY-ri} Z`;
  }
  return `M${x1},${y1} A${ro},${ro} 0 ${large},1 ${x2},${y2} L${x3},${y3} A${ri},${ri} 0 ${large},0 ${x4},${y4} Z`;
}

function mk(tag, attrs={}){
  const el = document.createElementNS(SVG_NS, tag);
  for(const [k,v] of Object.entries(attrs)) el.setAttribute(k,v);
  return el;
}

// SYNC UI
function syncUI(state, label){
  document.getElementById('sdot').className = 'sync-dot' + (state?' '+state:'');
  document.getElementById('slbl').textContent = label;
}

// FIRESTORE
async function subDay(key){
  if(unsub) unsub();
  syncUI('busy','กำลังโหลด');
  unsub = onSnapshot(doc(db,'days3',key), snap=>{
    blocks = snap.exists() ? (snap.data().blocks||[]) : [];
    draw();
    syncUI('on','sync แล้ว');
  }, ()=>syncUI('','ออฟไลน์'));
}

async function saveDay(){
  syncUI('busy','กำลังบันทึก');
  await setDoc(doc(db,'days3',dk(currentDay)), {blocks, date:dk(currentDay)});
  syncUI('on','sync แล้ว');
}

async function loadCats(){
  onSnapshot(doc(db,'settings','cats3'), snap=>{
    if(snap.exists()&&snap.data().list) categories = snap.data().list;
    drawLegend(); renderCatList();
  });
}
async function saveCats(){ await setDoc(doc(db,'settings','cats3'),{list:categories}); }

// DRAW
function draw(){
  const svg = document.getElementById('clock-svg');
  svg.innerHTML='';

  // BG donut
  const bgOuter = mk('circle',{cx:CX,cy:CY,r:RO,fill:'#16161a'});
  const bgInner = mk('circle',{cx:CX,cy:CY,r:RI,fill:'var(--bg)'});
  svg.appendChild(bgOuter);

  // Hour ticks & labels
  for(let h=0;h<24;h++){
    const a = minToRad(h*60);
    const isMaj = h%6===0;
    const cos=Math.cos(a), sin=Math.sin(a);
    const tick = mk('line',{
      x1:CX+(RI)*cos, y1:CY+(RI)*sin,
      x2:CX+(RO)*cos, y2:CY+(RO)*sin,
      stroke: isMaj?'#363644':'#222230',
      'stroke-width': isMaj?'1.5':'0.7'
    });
    svg.appendChild(tick);
    if(isMaj){
      const lr=RO+18;
      const t=mk('text',{
        x:CX+lr*cos, y:CY+lr*sin,
        'text-anchor':'middle','dominant-baseline':'central',
        fill:'#505060','font-size':'11','font-family':'IBM Plex Mono'
      });
      t.textContent=h.toString().padStart(2,'0');
      svg.appendChild(t);
    }
  }
  // 5-min ticks
  for(let m=0;m<1440;m+=5){
    if(m%60===0) continue;
    const a=minToRad(m);
    const t=mk('line',{
      x1:CX+RI*Math.cos(a),y1:CY+RI*Math.sin(a),
      x2:CX+(RI-3)*Math.cos(a),y2:CY+(RI-3)*Math.sin(a),
      stroke:'#222230','stroke-width':'0.5'
    });
    svg.appendChild(t);
  }

  svg.appendChild(bgInner);

  // Blocks
  blocks.forEach(b=>{
    const cat=catBy(b.cat);
    if(!cat) return;
    const p=mk('path',{
      d:arcPath(b.startMin,b.endMin,RI+2,RO-2),
      fill:cat.color+'bb', stroke:cat.color, 'stroke-width':'1.2'
    });
    p.style.cursor='pointer';
    p.addEventListener('click', ev=>{ ev.stopPropagation(); openEdit(b); });
    svg.appendChild(p);

    const span = b.endMin>b.startMin ? b.endMin-b.startMin : b.endMin+1440-b.startMin;
    if(span>=20){
      const midMin = b.startMin + span/2;
      const a = minToRad(midMin);
      const t=mk('text',{
        x:CX+RM*Math.cos(a), y:CY+RM*Math.sin(a),
        'text-anchor':'middle','dominant-baseline':'central',
        fill:'#fff','font-size':span>60?'10':'8',
        'font-family':'IBM Plex Sans Thai','pointer-events':'none'
      });
      t.textContent = cat.name.length>4?cat.name.slice(0,4):cat.name;
      svg.appendChild(t);
    }
  });

  // Drag preview
  if(isDragging && dragStartMin!==null && dragEndMin!==null && dragEndMin!==dragStartMin){
    const cat=catBy(activeCat);
    const pp=mk('path',{
      d:arcPath(dragStartMin,dragEndMin,RI+2,RO-2),
      fill:(cat?cat.color:'#7c6fff')+'55',
      stroke:cat?cat.color:'#7c6fff',
      'stroke-width':'1.5','stroke-dasharray':'5 3'
    });
    svg.appendChild(pp);

    // Center time display
    const span = dragEndMin>=dragStartMin ? dragEndMin-dragStartMin : dragEndMin+1440-dragStartMin;
    const t1=mk('text',{x:CX,y:CY-14,'text-anchor':'middle',fill:'#ebebf0','font-size':'17','font-family':'IBM Plex Mono'});
    t1.textContent=fmtMin(dragStartMin);
    const t2=mk('text',{x:CX,y:CY+8,'text-anchor':'middle',fill:'#80808f','font-size':'12','font-family':'IBM Plex Mono'});
    t2.textContent='→ '+fmtMin(dragEndMin);
    const t3=mk('text',{x:CX,y:CY+26,'text-anchor':'middle',fill:'#44444f','font-size':'11','font-family':'IBM Plex Mono'});
    t3.textContent=span+'นาที';
    svg.appendChild(t1); svg.appendChild(t2); svg.appendChild(t3);
  }

  // Now line
  const now=new Date();
  const nowMin=now.getHours()*60+now.getMinutes();
  const na=minToRad(nowMin);
  const nl=mk('line',{
    x1:CX+(RI-4)*Math.cos(na),y1:CY+(RI-4)*Math.sin(na),
    x2:CX+(RO+4)*Math.cos(na),y2:CY+(RO+4)*Math.sin(na),
    stroke:'#ffffff','stroke-width':'2'
  });
  const nd=mk('circle',{cx:CX+RM*Math.cos(na),cy:CY+RM*Math.sin(na),r:'3',fill:'#fff'});
  svg.appendChild(nl); svg.appendChild(nd);
}

// DRAG HANDLERS
const svg = document.getElementById('clock-svg');

function onStart(e){
  const pt=svgCoords(e);
  if(!onRing(pt.x,pt.y)) return;
  isDragging=true;
  dragStartMin=ptToMin(pt.x,pt.y);
  dragEndMin=dragStartMin;
}
function onMove(e){
  if(!isDragging) return;
  const pt=svgCoords(e);
  dragEndMin=ptToMin(pt.x,pt.y);
  draw();
}
function onEnd(e){
  if(!isDragging) return;
  isDragging=false;
  const span = dragEndMin>=dragStartMin ? dragEndMin-dragStartMin : dragEndMin+1440-dragStartMin;
  if(span>=5){
    pendingRange={startMin:dragStartMin, endMin:dragEndMin};
    editingId=null; selCatId=activeCat;
    openSheet();
  }
  dragStartMin=null; dragEndMin=null;
  draw();
}

svg.addEventListener('mousedown',e=>{e.preventDefault();onStart(e);});
svg.addEventListener('mousemove',e=>{if(isDragging){e.preventDefault();onMove(e);}});
svg.addEventListener('mouseup',e=>{onEnd(e);});
svg.addEventListener('mouseleave',e=>{if(isDragging)onEnd(e);});
svg.addEventListener('touchstart',e=>{e.preventDefault();onStart(e);},{passive:false});
svg.addEventListener('touchmove',e=>{e.preventDefault();onMove(e);},{passive:false});
svg.addEventListener('touchend',e=>{e.preventDefault();onEnd(e);},{passive:false});

// SHEET
function openSheet(){
  const s=pendingRange.startMin, en=pendingRange.endMin;
  const span = en>=s ? en-s : en+1440-s;
  document.getElementById('stime').textContent = fmtMin(s)+' → '+fmtMin(en)+'  ('+span+' นาที)';
  document.getElementById('delbtn').style.display = editingId ? 'flex' : 'none';
  renderChips();
  document.getElementById('overlay').classList.add('open');
  setTimeout(()=>document.getElementById('ninp').focus(),300);
}

function renderChips(){
  document.getElementById('chips').innerHTML=categories.map(c=>`
    <button class="chip" id="chip-${c.id}"
      style="${selCatId===c.id?'background:'+c.color+'22;border-color:'+c.color+';color:'+c.color:''}"
      onclick="pickCat('${c.id}','${c.color}')">
      <div class="chipdot" style="background:${c.color}"></div>${c.name}
    </button>`).join('');
}

window.pickCat=function(id){
  selCatId=id; activeCat=id; renderChips(); drawLegend();
};

window.tryCloseSheet=function(e){
  if(e.target===document.getElementById('overlay')) closeSheet();
};
window.closeSheet=function(){
  document.getElementById('overlay').classList.remove('open');
  editingId=null; pendingRange=null; selCatId=null;
  document.getElementById('ninp').value='';
};

window.saveBlock=async function(){
  if(!selCatId){alert('เลือกหมวดหมู่ก่อนนะครับ');return;}
  const note=document.getElementById('ninp').value.trim();
  if(editingId){
    const idx=blocks.findIndex(b=>b.id===editingId);
    if(idx>=0){blocks[idx].cat=selCatId;blocks[idx].note=note;}
  } else {
    blocks.push({id:'b'+Date.now(),startMin:pendingRange.startMin,endMin:pendingRange.endMin,cat:selCatId,note});
  }
  closeSheet(); draw(); await saveDay();
};

window.deleteBlock=async function(){
  if(!editingId||!confirm('ลบรายการนี้?')) return;
  blocks=blocks.filter(b=>b.id!==editingId);
  closeSheet(); draw(); await saveDay();
};

function openEdit(b){
  editingId=b.id;
  pendingRange={startMin:b.startMin,endMin:b.endMin};
  selCatId=b.cat;
  document.getElementById('ninp').value=b.note||'';
  openSheet();
}

// LEGEND
function drawLegend(){
  document.getElementById('legend').innerHTML=categories.map(c=>`
    <button class="lchip" style="${activeCat===c.id?'background:'+c.color+'20;border-color:'+c.color+';color:'+c.color:''}"
      onclick="setActive('${c.id}')">
      <div class="ldot" style="background:${c.color}"></div>${c.name}
    </button>`).join('');
}
window.setActive=function(id){activeCat=id;drawLegend();};

// DATE NAV
const DAYS=['อาทิตย์','จันทร์','อังคาร','พุธ','พฤหัสบดี','ศุกร์','เสาร์'];
const MONTHS=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
function updDate(){
  const today=new Date();today.setHours(0,0,0,0);
  const cd=new Date(currentDay);cd.setHours(0,0,0,0);
  const isT=cd.getTime()===today.getTime();
  document.getElementById('dname').textContent=(isT?'วันนี้ · ':'')+DAYS[currentDay.getDay()];
  document.getElementById('dfull').textContent=currentDay.getDate()+' '+MONTHS[currentDay.getMonth()]+' '+(currentDay.getFullYear()+543);
  const n=new Date();
  document.getElementById('htime').textContent=n.getHours().toString().padStart(2,'0')+':'+n.getMinutes().toString().padStart(2,'0');
}
window.chday=function(d){currentDay=new Date(currentDay);currentDay.setDate(currentDay.getDate()+d);updDate();subDay(dk(currentDay));};
window.goToday=function(){currentDay=new Date();updDate();subDay(dk(currentDay));};

// SUMMARY
window.setSP=function(p,btn){
  summaryPeriod=p;
  document.querySelectorAll('.pbtn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderSummary();
};

async function renderSummary(){
  const counts={};let total=0;let ddays=0;
  categories.forEach(c=>counts[c.id]=0);
  const today=new Date();today.setHours(0,0,0,0);
  for(let i=summaryPeriod-1;i>=0;i--){
    const d=new Date(today);d.setDate(d.getDate()-i);
    const snap=await getDoc(doc(db,'days3',dk(d)));
    if(snap.exists()){
      const bs=snap.data().blocks||[];
      if(bs.length) ddays++;
      bs.forEach(b=>{
        const sp=b.endMin>=b.startMin?b.endMin-b.startMin:b.endMin+1440-b.startMin;
        total+=sp;
        if(counts[b.cat]!==undefined) counts[b.cat]+=sp;
      });
    }
  }
  const avgH=ddays?(total/ddays/60).toFixed(1):0;
  const topE=Object.entries(counts).sort((a,b)=>b[1]-a[1])[0];
  const topC=topE?catBy(topE[0]):null;
  document.getElementById('mgrid').innerHTML=`
    <div class="mcard"><div class="ml">ชั่วโมงที่บันทึก</div><div class="mv">${Math.round(total/60)}</div><div class="ms">${summaryPeriod} วันล่าสุด</div></div>
    <div class="mcard"><div class="ml">เฉลี่ย/วัน</div><div class="mv">${avgH}</div><div class="ms">ชั่วโมง</div></div>
    <div class="mcard"><div class="ml">วันที่มีข้อมูล</div><div class="mv">${ddays}</div><div class="ms">จาก ${summaryPeriod} วัน</div></div>
    <div class="mcard"><div class="ml">กิจกรรมหลัก</div><div class="mv" style="font-size:15px;margin-top:4px">${topC?topC.name:'—'}</div><div class="ms">${topE?Math.round(topE[1]/60):0} ชม.</div></div>`;
  const sorted=categories.filter(c=>counts[c.id]>0).sort((a,b)=>counts[b.id]-counts[a.id]);
  const maxV=sorted[0]?counts[sorted[0].id]:1;
  document.getElementById('blist').innerHTML=sorted.length?sorted.map(c=>{
    const pct=Math.round((counts[c.id]/maxV)*100);
    const hpct=total?Math.round((counts[c.id]/total)*100):0;
    return `<div class="brow"><div class="bname" style="color:${c.color}">${c.name}</div><div class="btrack"><div class="bfill" style="width:${pct}%;background:${c.color}"></div></div><div class="bval">${Math.round(counts[c.id]/60)}h·${hpct}%</div></div>`;
  }).join(''):'<div class="empty">ยังไม่มีข้อมูลในช่วงนี้</div>';
}

// SETTINGS
function renderCatList(){
  document.getElementById('catlist').innerHTML=categories.map((c,i)=>`
    <div class="citem"><div class="cdot" style="background:${c.color}"></div><div class="cname">${c.name}</div><button class="cdel" onclick="delCat(${i})">×</button></div>`).join('');
}
window.addCat=async function(){
  const name=document.getElementById('ncname').value.trim();
  const color=document.getElementById('nccolor').value;
  if(!name) return;
  categories.push({id:'c'+Date.now(),name,color});
  document.getElementById('ncname').value='';
  await saveCats();renderCatList();drawLegend();
};
window.delCat=async function(i){
  if(!confirm('ลบหมวดหมู่?')) return;
  categories.splice(i,1);await saveCats();renderCatList();drawLegend();
};
window.exportJSON=function(){
  const b=new Blob([JSON.stringify({categories,blocks},null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='life-tracker-'+dk(currentDay)+'.json';a.click();
};
window.clearDay=async function(){
  if(!confirm('ล้างข้อมูลวันนี้?')) return;
  blocks=[];await saveDay();draw();
};

// NAV
window.sw=function(name){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('view-'+name).classList.add('active');
  const idx=['clock','summary','settings'].indexOf(name);
  document.querySelectorAll('.nav-btn')[idx].classList.add('active');
  if(name==='summary') renderSummary();
  if(name==='settings') renderCatList();
};

// INIT
async function init(){
  updDate();
  await loadCats();
  await subDay(dk(currentDay));
  drawLegend();
  document.getElementById('loading').style.display='none';
  document.getElementById('app').style.display='flex';
  setInterval(()=>{updDate();draw();},30000);
}
init();
</script>
